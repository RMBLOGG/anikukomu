name: Notify Telegram on Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Message
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          python3 - <<'PYEOF'
          import os
          import urllib.request
          import urllib.parse

          bot_token = os.environ.get("BOT_TOKEN", "")
          chat_id = os.environ.get("CHAT_ID", "")
          name = os.environ.get("RELEASE_NAME", "")
          body = os.environ.get("RELEASE_BODY", "")

          # Hapus section yang tidak perlu
          skip_sections = ["instalasi", "minimum android"]
          lines = body.splitlines()
          result = []
          skip = False
          for l in lines:
              lower = l.strip().lower()
              if any(s in lower for s in skip_sections):
                  skip = True
              if lower.startswith("### ") and not any(s in lower for s in skip_sections):
                  skip = False
              if skip:
                  continue
              if "github.com" in l or "Full Changelog" in l:
                  continue
              if l.startswith("### "):
                  result.append(f"*{l[4:].strip()}*")
              elif l.strip() == "---":
                  continue
              elif l.strip().startswith("> "):
                  continue
              else:
                  result.append(l)

          while result and not result[-1].strip():
              result.pop()

          clean_body = "\n".join(result).strip()
          message = f"*{name}* telah dirilis!\n\n{clean_body}\n\nDownload: https://anikukomu.vercel.app/"

          url = f"https://api.telegram.org/bot{bot_token}/sendMessage"
          data = urllib.parse.urlencode({
              "chat_id": chat_id,
              "text": message,
              "parse_mode": "Markdown"
          }).encode()

          req = urllib.request.Request(url, data=data)
          with urllib.request.urlopen(req) as res:
              print(res.read().decode())
          PYEOF
